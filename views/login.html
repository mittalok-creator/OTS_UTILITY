<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UPGB OTS Calculator — Sign in</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#122642">
<link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-logo"><img src="/icons/upgb-logo.png" alt="UPGB" width="34" height="34"></div>
  <h1>UPGB OTS Calculator</h1>
  <p>Enter the access code to continue.</p>
  <form id="loginForm" autocomplete="off">
    <input type="password" id="passphrase" placeholder="Access Code" autocomplete="current-password" required>
    <button type="submit" id="loginBtn">Sign in</button>
  </form>
  <div id="loginError" class="login-error" role="alert" aria-live="polite"></div>
  <div class="login-signature">
    <span class="ls-badge"><span>AM</span></span>
    <span class="ls-name">Alok Mittal</span>
  </div>
</div>
<script>
const form = document.getElementById('loginForm');
const errEl = document.getElementById('loginError');
const btn = document.getElementById('loginBtn');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passphrase: document.getElementById('passphrase').value }),
    });
    if (res.ok) { window.location.href = '/app'; return; }
    const data = await res.json().catch(() => ({}));
    errEl.textContent = data.error || 'Sign in failed.';
  } catch (err) {
    errEl.textContent = 'Network error — check your connection.';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
